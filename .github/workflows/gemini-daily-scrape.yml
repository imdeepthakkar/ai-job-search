name: '🕵️ Daily Job Scrape'

on:
  schedule:
    - cron: '0 7 * * *' # Runs every day at 07:00 UTC (08:00 CET / 09:00 CEST)
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

env:
  GEMINI_CLI_TRUST_WORKSPACE: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

defaults:
  run:
    shell: 'bash'

jobs:
  scrape:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    permissions:
      contents: 'write'
      id-token: 'write'
      issues: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Initialize Scraper Files'
        run: |-
          mkdir -p job_scraper
          if [ ! -f job_scraper/seen_jobs.json ]; then
            echo '{"seen": {}}' > job_scraper/seen_jobs.json
          fi

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@v1'
        with:
          bun-version: 'latest'

      - name: 'Install scraper dependencies'
        run: |-
          cd .agents/skills/jobindex-search/cli && bun install
          cd ../../jobbank-search/cli && bun install

      - name: 'Execute Job Searches'
        id: 'run_searches'
        run: |-
          echo "🔍 Running job searches..."
          TEMP_DIR="${{ github.workspace }}/.temp"
          mkdir -p "$TEMP_DIR"
          
          # Clean extraction of keywords and titles from search-queries.md
          QUERIES=$(grep -E "^\s*-\s*\*\*(Titles|Keywords):\*\*" .claude/skills/job-scraper/search-queries.md | sed -E 's/^\s*-\s*\*\*(Titles|Keywords):\*\*\s*(.*)/\2/' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v "^$" | sort -u | head -n 15)
          
          echo "Found queries:"
          echo "$QUERIES"
          
          RESULTS_FILE="$TEMP_DIR/all_results.json"
          echo "[]" > "$RESULTS_FILE"
          
          SCRAPER_DIR="${{ github.workspace }}/.agents/skills/jobindex-search/cli"
          cd "$SCRAPER_DIR"
          
          while IFS= read -r query; do
            [ -z "$query" ] && continue
            echo "Searching for: $query"
            
            # Search via jobindex-cli
            bun run src/cli.ts search --query "$query" --jobage 7 --limit 20 > "$TEMP_DIR/tmp_res.json" 2> "$TEMP_DIR/scraper_err.log" || {
              echo "❌ Error searching for $query. Log content:"
              cat "$TEMP_DIR/scraper_err.log"
              continue
            }
            
            # Merge results into the main results file
            if [ -s "$TEMP_DIR/tmp_res.json" ]; then
              jq -s '.[0] + .[1].results' "$RESULTS_FILE" "$TEMP_DIR/tmp_res.json" > "$TEMP_DIR/merged.json"
              mv "$TEMP_DIR/merged.json" "$RESULTS_FILE"
            fi

            # Add a small delay
            sleep 2
          done <<< "$QUERIES"
          
          cd "${{ github.workspace }}"
          # Deduplicate results by ID
          jq 'unique_by(.id)' "$RESULTS_FILE" > "$TEMP_DIR/unique_results.json"
          
          COUNT=$(jq 'length' "$TEMP_DIR/unique_results.json")
          echo "✅ Found $COUNT total unique jobs."
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: 'Filter New Jobs'
        id: 'filter_jobs'
        if: steps.run_searches.outputs.count != '0'
        run: |-
          python job_scraper/filter_new_jobs.py
          COUNT=$(jq 'length' "${{ github.workspace }}/.temp/unique_results.json")
          echo "✅ Found $COUNT new unseen jobs."
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: 'Run Gemini Analysis'
        if: steps.run_searches.outputs.count != '0' && steps.filter_jobs.outputs.count != '0'
        continue-on-error: true
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GOOGLE_API_KEY: '${{ secrets.GOOGLE_API_KEY }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          workflow_name: 'gemini-scrape'
          prompt: |-
            Analyze these job postings against the candidate profile in `CLAUDE.md`.
            Deduplicate against `job_scraper/seen_jobs.json` and `job_search_tracker.csv`.
            
            **Profile:**
            !{cat CLAUDE.md}
            
            **Seen Jobs:**
            !{cat job_scraper/seen_jobs.json || echo '{"seen": {}}'}
            
            **Tracker:**
            !{cat job_search_tracker.csv || echo "id,company,role,status"}
            
            **New Scraped Jobs:**
            !{cat .temp/unique_results.json}
            
            **Task:**
            1. Filter out jobs already in Seen Jobs or Tracker.
            2. For the remaining jobs, perform a quick fit assessment (High/Medium/Low).
            3. Generate a Markdown report saved to `scrape_report.md`.
            4. Update `job_scraper/seen_jobs.json` with all new jobs and save it.
            5. Use a single turn. Do not ask for more info.
          settings: |-
            {
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(ls)"
                ]
              }
            }

      - name: 'Check for report and create issue'
        id: 'notify'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |-
          if [ -f "scrape_report.md" ]; then
            REPORT_TITLE="💼 New Job Matches - $(date +'%Y-%m-%d')"
            gh issue create --title "$REPORT_TITLE" --body-file "scrape_report.md" --repo "${{ github.repository }}"
          fi

      - name: 'Compile Dashboard Data'
        env:
          SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'
          SUPABASE_SERVICE_KEY: '${{ secrets.SUPABASE_SERVICE_KEY }}'
        run: |-
          python job_scraper/export_all_jobs.py

      - name: 'Commit and Push Scrape Data'
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f job_scraper/seen_jobs.json ]; then
            git add -f job_scraper/seen_jobs.json
          fi
          # Remove data folder addition
          # git add job_scraper/data/*
          git add job_scraper/index.html job_scraper/dashboard.html || true
          git commit -m "chore: update scrape database [skip ci]" || echo "No changes to commit"
          git pull --rebase origin master
          git push

      - name: 'Deploy to Vercel'
        env:
          VERCEL_TOKEN: '${{ secrets.VERCEL_TOKEN }}'
          VERCEL_ORG_ID: 'team_8MsHpgWHhC0zsZt1uxS26SBo'
          VERCEL_PROJECT_ID: 'prj_r3TQqoyxRCzN2OZyFp0agbgjIEL7'
        run: |-
          sed -i "s|REPLACE_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" job_scraper/index.html
          sed -i "s|REPLACE_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" job_scraper/index.html
          cd job_scraper
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
